name: Daily Test

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: daily-test
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  DAILY_BRANCH: daily-test/update-baselines

jobs:
  daily-test:
    name: Daily Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Prepare daily branch
        run: |
          git fetch --no-tags origin main
          git fetch --no-tags origin "+refs/heads/$DAILY_BRANCH:refs/remotes/origin/$DAILY_BRANCH" || true
          git checkout -B "$DAILY_BRANCH" origin/main
          mkdir -p .daily-test
          printf ".daily-test/\n" >> .git/info/exclude

      - name: Update fixture repos
        run: scripts/update-submodules.sh

      - name: Update MoonBit registry
        run: |
          for attempt in 1 2 3; do
            if moon update; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Test generator
        run: moon -C testgen test --target wasm

      - name: Update generated tests
        run: scripts/update-tests.sh

      - name: Refresh snapshots
        run: |
          mkdir -p .daily-test
          moon cram update --replace --assume-yes --cram-compat tests/unix \
            > .daily-test/cram-update.log 2>&1

      - name: Run cram tests
        id: cram
        run: |
          set +e
          moon cram test --cram-compat tests/unix \
            > .daily-test/cram-test.log 2>&1
          status=$?
          set -e
          echo "$status" > .daily-test/cram-test-status.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Collect review inputs
        if: always()
        run: |
          mkdir -p .daily-test
          git submodule status --recursive > .daily-test/submodules.txt
          git status --short > .daily-test/status.txt

      - name: Detect daily diff
        id: diff
        run: |
          if git diff --quiet -- fixtures/repos tests/unix tests/windows; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit daily changes
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/repos tests/unix tests/windows
          git commit -m "chore: update daily IDE baselines"
          git push --force-with-lease origin "$DAILY_BRANCH"

      - name: Create or update pull request
        id: pr
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list \
            --head "$DAILY_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          body="$(printf '%s\n\n%s\n%s\n' \
            "This PR was generated by the Daily Test workflow." \
            "It refreshes fixture submodules, regenerates IDE baseline tests with testgen," \
            "and promotes Moon Cram snapshots.")"

          if [ -z "$pr_number" ]; then
            pr_url="$(gh pr create \
              --base main \
              --head "$DAILY_BRANCH" \
              --title "chore: update daily IDE baselines" \
              --body "$body")"
            pr_number="${pr_url##*/}"
          else
            gh pr edit "$pr_number" \
              --title "chore: update daily IDE baselines" \
              --body "$body"
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Install Codex CLI
        if: steps.diff.outputs.has_changes == 'true'
        run: npm install -g @openai/codex

      - name: Restore Codex ChatGPT auth
        if: steps.diff.outputs.has_changes == 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::error::Set the CODEX_AUTH_JSON repository secret to a file-backed ChatGPT auth.json from codex login."
            exit 1
          fi

          mkdir -p "$HOME/.codex"
          chmod 700 "$HOME/.codex"
          cat > "$HOME/.codex/config.toml" <<'TOML'
          cli_auth_credentials_store = "file"
          web_search = "disabled"
          TOML

          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

          jq -e '
            .auth_mode == "chatgpt" and
            ((.tokens.refresh_token // "") != "")
          ' "$HOME/.codex/auth.json" >/dev/null

      - name: Review daily output with Codex
        id: codex
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          codex exec \
            --sandbox read-only \
            --ask-for-approval never \
            --ephemeral \
            --output-schema .github/codex/schemas/daily-test-review.schema.json \
            -o .daily-test/codex-review.json \
            "$(cat .github/codex/prompts/daily-test-review.md)"

      - name: Parse Codex review
        id: codex-result
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          node <<'NODE'
          const fs = require("fs");
          const raw = fs.readFileSync(".daily-test/codex-review.json", "utf8").trim();
          const parsed = JSON.parse(raw);
          const hasProblem = parsed.has_problem === true;
          const commentBody = typeof parsed.comment_body === "string" ? parsed.comment_body.trim() : "";
          const delimiter = `CODEX_COMMENT_${Date.now()}`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_problem=${hasProblem}\n`);
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `comment_body<<${delimiter}\n${commentBody}\n${delimiter}\n`,
          );
          NODE

      - name: Comment on pull request
        if: steps.diff.outputs.has_changes == 'true' && steps.codex-result.outputs.has_problem == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMENT_BODY: ${{ steps.codex-result.outputs.comment_body }}
        with:
          github-token: ${{ github.token }}
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            const body = process.env.COMMENT_BODY.trim();

            if (!issue_number) {
              throw new Error("Missing pull request number");
            }
            if (!body) {
              throw new Error("Codex reported a problem but returned an empty comment body");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });

      - name: Fail if cram tests failed without a diff
        if: steps.diff.outputs.has_changes == 'false' && steps.cram.outputs.status != '0'
        run: |
          cat .daily-test/cram-test.log
          exit 1

  windows-baseline:
    name: Windows Baselines
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MoonBit
        shell: powershell
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update MoonBit registry
        shell: powershell
        run: |
          foreach ($attempt in 1, 2, 3) {
            moon update
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq 3) {
              exit 1
            }
            Start-Sleep -Seconds ($attempt * 10)
          }

      - name: Run Windows baselines
        shell: powershell
        run: moon cram test --cram-compat --no-keep-output-crlf --shell scripts\moon-cram-powershell.cmd tests\windows
