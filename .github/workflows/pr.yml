name: PR

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: |
          for attempt in 1 2 3; do
            if moon update; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Test generator
        run: moon -C testgen test --target wasm

      - name: Verify generated baselines
        run: |
          scripts/update-tests.sh
          git diff --exit-code -- tests/unix

      - name: Run Unix baselines
        run: moon cram test --cram-compat tests/unix

  windows-baseline:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install MoonBit
        shell: powershell
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update MoonBit registry
        shell: powershell
        run: |
          foreach ($attempt in 1, 2, 3) {
            moon update
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq 3) {
              exit 1
            }
            Start-Sleep -Seconds ($attempt * 10)
          }

      - name: Verify generated Windows baselines
        shell: powershell
        run: |
          .\scripts\update-windows-tests.ps1
          git diff --exit-code -- tests\windows

      - name: Run Windows baselines
        shell: powershell
        run: moon cram test --cram-compat --no-keep-output-crlf --shell scripts\moon-cram-powershell.cmd tests\windows
