name: Canary

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update fixture repos
        run: scripts/update-submodules.sh

      - name: Update MoonBit registry
        run: |
          for attempt in 1 2 3; do
            if moon update; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Update generated tests
        run: scripts/update-tests.sh

      - name: Refresh snapshots
        run: moon cram update --replace --assume-yes --cram-compat tests/baseline

      - name: Run tests
        run: moon cram test --cram-compat tests/baseline

      - name: Collect canary diff
        if: always()
        run: |
          mkdir -p artifacts/canary
          git submodule status --recursive > artifacts/canary/summary.txt
          git diff -- fixtures/repos tests/baseline > artifacts/canary/diff.patch || true

      - name: Upload canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moon-ide-canary
          path: artifacts/canary
          if-no-files-found: error
